exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && sleep 1 && systemctl --user stop xdg-desktop-portal-gtk xdg-desktop-portal-hyprland xdg-desktop-portal && systemctl --user start xdg-desktop-portal-hyprland && sleep 1 && systemctl --user start xdg-desktop-portal
exec-once = systemctl --user start hyprpolkitagent
exec-once = mako
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = bash -c '[ -x /usr/lib/pam_kwallet_init ] && /usr/lib/pam_kwallet_init'
exec-once = rm -f /tmp/wob_pipe && mkfifo /tmp/wob_pipe && tail -f /tmp/wob_pipe | wob -c ~/.config/wob/wob.ini
exec-once = ~/.config/hypr/scripts/battery-watch
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
